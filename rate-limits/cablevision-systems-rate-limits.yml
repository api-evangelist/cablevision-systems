description: Cablevision Systems does not publish a public developer API, so no programmatic rate limits
  are documented. This artifact preserves the API Commons Rate Limits structure with empty limits and
  a note explaining the absence of public API throttling policy.
sources:
  - https://www.alticeusa.com/
  - https://www.optimum.com/
notes: |
  Cablevision Systems was acquired by Altice and now operates as part of Altice USA under the Optimum
  brand. It does not publish a public, general-purpose developer API or developer pricing. Consumer
  broadband, TV, and voice services are sold via standard residential / business pricing schedules;
  B2B integrations are governed by private contracts.
